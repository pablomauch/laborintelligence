<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labor Intelligence · BPS</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"><\/script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g1:#046A38;--g2:#86BC25;--g3:#43B02A;--g4:#EEF7E8;--g5:#D4EDBA;
  --dark:#16202C;--dark2:#1F2D3D;--mid:#5A6A7A;--light:#F5F9F3;
  --border:#E2EDD8;--white:#FFFFFF;--red:#D32F2F;--yellow:#E65100;
  --sidebar-w:248px;--header-h:58px;--r:10px;
  --sh:0 2px 12px rgba(4,106,56,.07);--sh-lg:0 8px 32px rgba(4,106,56,.13);
}
html{font-family:'Sora',sans-serif;font-size:14px}
body{background:var(--light);color:var(--dark);display:flex;height:100vh;overflow:hidden}
button{cursor:pointer;font-family:inherit;border:none}
input,textarea,select{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--g5);border-radius:2px}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--dark);height:100vh;display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100}
.sb-logo{padding:16px 18px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo-row{display:flex;align-items:center;gap:10px}
.sb-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--g2),var(--g3));border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--dark);font-size:11px;flex-shrink:0}
.sb-name{color:#fff;font-size:15px;font-weight:700;letter-spacing:-.3px}
.sb-tagline{color:rgba(255,255,255,.35);font-size:9px;margin-top:1px;letter-spacing:1.2px;text-transform:uppercase}
.sb-section{padding:12px 10px 4px}
.sb-section-label{color:rgba(255,255,255,.25);font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:0 8px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.5);font-size:12.5px;font-weight:500;transition:all .15s;margin-bottom:1px}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-item.active{background:var(--g1);color:#fff}
.nav-icon{width:16px;height:16px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--g2);color:var(--dark);font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px}
.sb-bottom{margin-top:auto;padding:10px;border-top:1px solid rgba(255,255,255,.07)}
.user-chip{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s}
.user-chip:hover{background:rgba(255,255,255,.06)}
.u-av{width:32px;height:32px;background:var(--g1);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0}
.u-name{color:rgba(255,255,255,.8);font-size:12px;font-weight:600}
.u-role{color:rgba(255,255,255,.3);font-size:10px}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:var(--header-h);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:14px;flex-shrink:0}
.tb-title{font-size:16px;font-weight:700;color:var(--dark)}
.tb-sub{font-size:11px;color:var(--mid);padding:2px 8px;background:var(--g4);border-radius:4px;font-weight:500}
.tb-spacer{flex:1}
.tb-actions{display:flex;align-items:center;gap:8px}
.content{flex:1;overflow-y:auto;padding:22px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;transition:all .15s;cursor:pointer;font-family:'Sora',sans-serif}
.btn-primary{background:var(--g1);color:#fff}.btn-primary:hover{background:#035a30}
.btn-secondary{background:var(--g4);color:var(--g1);border:1px solid var(--g5)}.btn-secondary:hover{background:var(--g5)}
.btn-ghost{background:transparent;color:var(--mid);border:1px solid var(--border)}.btn-ghost:hover{background:var(--light)}
.btn-sm{padding:5px 11px;font-size:11px}
.view{display:none}.view.active{display:block;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:13px;font-weight:700;color:var(--dark)}
.card-sub{font-size:11px;color:var(--mid);margin-top:2px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--g2)}
.stat-card.s-dark::after{background:var(--g1)}.stat-card.s-yellow::after{background:var(--yellow)}.stat-card.s-red::after{background:var(--red)}
.stat-label{font-size:10px;color:var(--mid);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.stat-value{font-size:26px;font-weight:700;color:var(--dark);line-height:1}
.stat-delta{font-size:10px;color:var(--g3);margin-top:4px}.stat-delta.neg{color:var(--red)}
.modules-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.mod-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--sh);cursor:pointer;transition:all .2s}
.mod-card:hover{box-shadow:var(--sh-lg);transform:translateY(-2px);border-color:var(--g5)}
.mod-card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.mod-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:var(--g4)}
.mod-name{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:3px}
.mod-desc{font-size:11px;color:var(--mid);line-height:1.5}
.mod-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.mod-stat{font-size:11px;color:var(--mid)}.mod-stat strong{color:var(--dark);font-weight:700}
.pill{font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
.pill-ok{background:var(--g4);color:var(--g1)}.pill-warn{background:#FFF3E0;color:#BF360C}.pill-red{background:#FFEBEE;color:var(--red)}
.agent-panel{background:linear-gradient(135deg,var(--g1) 0%,#024D28 100%);border-radius:var(--r);padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:18px;color:#fff}
.ag-av{width:44px;height:44px;background:rgba(255,255,255,.15);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ag-info{flex:1}
.ag-name{font-size:13px;font-weight:700;margin-bottom:2px}
.ag-status{font-size:11px;color:rgba(255,255,255,.65);display:flex;align-items:center;gap:6px}
.ag-dot{width:6px;height:6px;background:var(--g2);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ag-actions{display:flex;gap:8px}
.ag-btn{padding:6px 13px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:'Sora',sans-serif;transition:all .15s}
.ag-btn-primary{background:var(--g2);color:var(--dark)}.ag-btn-primary:hover{background:#9dd42b}
.ag-btn-ghost{background:rgba(255,255,255,.12);color:#fff}.ag-btn-ghost:hover{background:rgba(255,255,255,.22)}
.tabs{display:flex;gap:2px;background:var(--light);padding:3px;border-radius:7px;margin-bottom:18px;width:fit-content;border:1px solid var(--border)}
.tab{padding:6px 14px;border-radius:5px;font-size:11px;font-weight:600;color:var(--mid);cursor:pointer;transition:all .15s;border:none;background:none;font-family:'Sora',sans-serif}
.tab.active{background:var(--white);color:var(--dark);box-shadow:0 1px 4px rgba(0,0,0,.07)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--light);padding:9px 13px;text-align:left;font-weight:700;font-size:10px;color:var(--mid);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:10px 13px;border-bottom:1px solid var(--border);color:var(--dark)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--light)}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px}
.pbar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pfill{height:100%;background:var(--g2);border-radius:3px}
.pfill.pr{background:var(--red)}.pfill.py{background:var(--yellow)}
.alert-list{display:flex;flex-direction:column;gap:7px}
.alert-item{display:flex;gap:10px;padding:11px 13px;border-radius:8px;border:1px solid}
.ai-danger{background:#FFEBEE;border-color:#FFCDD2}.ai-warn{background:#FFF3E0;border-color:#FFE0B2}.ai-info{background:var(--g4);border-color:var(--g5)}
.ai-em{font-size:15px;flex-shrink:0;padding-top:1px}
.ai-text{font-size:11.5px;line-height:1.55}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.mb14{margin-bottom:14px}.mb18{margin-bottom:18px}.mb20{margin-bottom:20px}
.flex-b{display:flex;align-items:center;justify-content:space-between}
.flex-g{display:flex;align-items:center;gap:8px}
.t-mid{color:var(--mid);font-size:11px}
.bc{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mid);margin-bottom:16px}
.bc-link{cursor:pointer;color:var(--g1)}.bc-sep{color:var(--border)}.bc-cur{color:var(--dark);font-weight:600}
.upload-zone{border:2px dashed var(--border);border-radius:var(--r);padding:28px;text-align:center;cursor:pointer;transition:all .2s;background:var(--white)}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--g2);background:var(--g4)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:500;display:none;align-items:center;justify-content:center}
.modal-ov.open{display:flex}
.modal{background:var(--white);border-radius:14px;padding:26px;width:500px;max-height:82vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.2)}
.modal-title{font-size:17px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--mid);margin-bottom:18px}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.fg{margin-bottom:12px}
.fg label{font-size:11px;font-weight:700;color:var(--mid);margin-bottom:4px;display:block}
.fi{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:7px;font-size:12px;outline:none;transition:border-color .15s;background:#fff}
.fi:focus{border-color:var(--g2)}
.chart-container{position:relative;height:200px}
.chart-container-lg{position:relative;height:260px}
.chart-container-sm{position:relative;height:160px}
.doc-list{display:flex;flex-direction:column;gap:7px}
.doc-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--white);border:1px solid var(--border);border-radius:7px;transition:border-color .15s}
.doc-item:hover{border-color:var(--g5)}
.tl-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.tl-lbl{width:155px;font-size:11px;color:var(--mid);flex-shrink:0;text-align:right}
.tl-track{flex:1;height:22px;background:var(--light);border-radius:4px;overflow:hidden}
.tl-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:700;color:#fff}
.chat-toggle{position:fixed;bottom:22px;right:22px;z-index:1000;width:54px;height:54px;border-radius:50%;background:var(--dark);color:#fff;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(22,32,44,.35);display:flex;align-items:center;justify-content:center;transition:all .2s}
.chat-toggle:hover{transform:scale(1.07)}
.chat-notif{position:absolute;top:-2px;right:-2px;width:18px;height:18px;background:var(--g2);border-radius:50%;font-size:9px;font-weight:700;color:var(--dark);display:none;align-items:center;justify-content:center}
.chat-notif.show{display:flex}
.chat-panel{position:fixed;bottom:88px;right:22px;z-index:1000;width:370px;height:510px;background:var(--white);border-radius:16px;border:1px solid var(--border);box-shadow:0 20px 60px rgba(22,32,44,.2);display:flex;flex-direction:column;opacity:0;transform:translateY(16px) scale(.96);pointer-events:none;transition:all .25s cubic-bezier(.34,1.56,.64,1)}
.chat-panel.open{opacity:1;transform:translateY(0) scale(1);pointer-events:all}
.chat-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--dark);border-radius:16px 16px 0 0}
.ch-av{width:38px;height:38px;background:rgba(255,255,255,.1);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
.ch-title{color:#fff;font-size:13px;font-weight:700}
.ch-sub{color:rgba(255,255,255,.5);font-size:10px;display:flex;align-items:center;gap:5px}
.ch-online{width:6px;height:6px;background:var(--g2);border-radius:50%;animation:pulse 2s infinite}
.ch-close{margin-left:auto;background:rgba(255,255,255,.1);border:none;color:#fff;width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.ch-close:hover{background:rgba(255,255,255,.2)}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.cmsg{display:flex;gap:7px;max-width:92%}
.cmsg.user{margin-left:auto;flex-direction:row-reverse}
.mav{width:26px;height:26px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
.mav.bot{background:var(--dark);color:#fff}.mav.user{background:var(--g4);color:var(--g1)}
.mbub{padding:9px 12px;border-radius:11px;font-size:12px;line-height:1.55}
.cmsg.bot .mbub{background:var(--light);color:var(--dark);border-radius:3px 11px 11px 11px}
.cmsg.user .mbub{background:var(--g1);color:#fff;border-radius:11px 3px 11px 11px}
.typing-dots{display:flex;gap:3px;padding:10px 12px}
.typing-dots span{width:6px;height:6px;background:var(--mid);border-radius:50%;animation:tdot 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
.chat-foot{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0}
.qr-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.qr{padding:4px 9px;border:1px solid var(--border);border-radius:20px;font-size:10px;color:var(--mid);cursor:pointer;background:var(--white);transition:all .15s;white-space:nowrap}
.qr:hover{background:var(--g4);border-color:var(--g2);color:var(--g1)}
.chat-input-row{display:flex;gap:7px;align-items:flex-end}
.chat-input{flex:1;border:1px solid var(--border);border-radius:9px;padding:8px 12px;font-size:12px;resize:none;outline:none;font-family:'Sora',sans-serif;line-height:1.4;max-height:72px;min-height:36px;transition:border-color .15s}
.chat-input:focus{border-color:var(--g2)}
.chat-send{width:34px;height:34px;background:var(--g1);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.chat-send:hover{background:#035a30}
#toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--dark);color:#fff;padding:10px 18px;border-radius:9px;font-size:12px;font-weight:600;z-index:2000;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-logo"><div class="sb-logo-row"><div class="sb-icon">LI</div><div><div class="sb-name">Labor Intelligence</div><div class="sb-tagline">BPS · Plataforma</div></div></div></div>
  <div class="sb-section">
    <div class="sb-section-label">General</div>
    <div class="nav-item active" onclick="showView('dashboard')"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</div>
    <div class="nav-item" onclick="showView('alertas')"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Alertas <span class="nav-badge">7</span></div>
  </div>
  <div class="sb-section">
    <div class="sb-section-label">Módulos</div>
    <div class="nav-item" onclick="showView('acreditacion')"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Acreditación</div>
    <div class="nav-item" onclick="showView('aud-rem')"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Aud. Remuneracional</div>
    <div class="nav-item" onclick="showView('aud-lab')"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>Aud. Laboral &amp; HSE</div>
    <div class="nav-item" onclick="showView('inteligencia')"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>Inteligencia Laboral</div>
    <div class="nav-item" onclick="showView('cierre')"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Cierre de Contrato</div>
    <div class="nav-item" onclick="showView('pagos')"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Pagos &amp; Juicios</div>
  </div>
  <div class="sb-section">
    <div class="sb-section-label">Gestión</div>
    <div class="nav-item" onclick="showView('documentos')"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>Repositorio Docs</div>
    <div class="nav-item" onclick="showView('reportes')"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Reportes</div>
  </div>
  <div class="sb-bottom"><div class="user-chip"><div class="u-av">PM</div><div><div class="u-name">Pablo Mauch</div><div class="u-role">Lider de Servicio</div></div></div></div>
</aside>

<main class="main">
  <div class="topbar">
    <span class="tb-title" id="tb-title">Dashboard</span>

    });
  });
}

function baseOpts(extra) {
  var o = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { labels: { font: { family: FONT, size: 11 }, color: '#5A6A7A', boxWidth: 12 } } },
    scales: {
      x: { ticks: { font: { family: FONT, size: 10 }, color: '#5A6A7A' }, grid: { display: false } },
      y: { ticks: { font: { family: FONT, size: 10 }, color: '#5A6A7A' }, grid: { color: '#E2EDD8' } }
    }
  };
  if (extra) Object.assign(o, extra);
  return o;
}
function noScales() { return { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { font: { family: FONT, size: 11 }, color: '#5A6A7A', boxWidth: 12 } } } }; }
function hBar(extra) { var o = baseOpts(extra); o.indexAxis = 'y'; return o; }

function mkChart(id, type, data, opts) {
  if (CC[id]) return;
  var el = document.getElementById(id);
  if (!el) return;
  CC[id] = new Chart(el, { type: type, data: data, options: opts || baseOpts() });
